<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>By Lubna — تتبع الطلب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Tajawal',sans-serif; background:#FAF6F0; color:#2C1A12; min-height:100vh; }
.header {
  background: #7B1B42; color:#fff;
  padding:20px 24px; text-align:center;
  border-bottom:3px solid #C9A96E;
}
.header-logo {
  font-size:24px; font-weight:700; letter-spacing:3px;
  font-family:'Georgia',serif;
}
.header-sub { font-size:13px; opacity:.8; margin-top:4px; }
.container { max-width:600px; margin:32px auto; padding:0 20px; }
.search-box {
  background:#fff; border-radius:16px; padding:28px;
  box-shadow:0 4px 20px rgba(123,27,66,0.1);
  margin-bottom:24px; text-align:center;
}
.search-box h2 { font-size:18px; margin-bottom:16px; color:#7B1B42; }
.search-row { display:flex; gap:10px; }
.search-input {
  flex:1; padding:12px 16px; border:1.5px solid #DDD0C0;
  border-radius:10px; font-size:15px; font-family:inherit;
  direction:ltr; text-align:center;
}
.search-input:focus { outline:none; border-color:#7B1B42; }
.search-btn {
  background:#7B1B42; color:#fff; border:none;
  padding:12px 20px; border-radius:10px;
  font-size:14px; font-weight:700; cursor:pointer;
  font-family:inherit; white-space:nowrap;
}
.search-btn:hover { background:#9B2856; }

/* Result */
.result-card {
  background:#fff; border-radius:16px; padding:28px;
  box-shadow:0 4px 20px rgba(123,27,66,0.1);
}
.result-header {
  display:flex; justify-content:space-between; align-items:flex-start;
  margin-bottom:20px; flex-wrap:wrap; gap:10px;
}
.bill-no { font-size:18px; font-weight:700; color:#7B1B42; }
.status-badge {
  padding:6px 14px; border-radius:20px;
  font-size:13px; font-weight:700;
}
.s-new    { background:#E8F4FD; color:#2980B9; }
.s-tailor { background:#FEF9E7; color:#E67E22; }
.s-ready  { background:#EAFAF1; color:#27AE60; }
.s-done   { background:#F0F3F4; color:#7F8C8D; }
.s-cancel { background:#FDEDEC; color:#E74C3C; }

.info-row {
  display:flex; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid #F3EDE4;
  font-size:14px;
}
.info-row:last-child { border-bottom:none; }
.info-label { color:#6B4C3B; }
.info-value { font-weight:600; }

.timeline { margin-top:24px; }
.timeline-title { font-size:14px; font-weight:700; margin-bottom:16px; color:#7B1B42; }
.step {
  display:flex; align-items:flex-start; gap:14px;
  margin-bottom:16px;
}
.step-dot {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; border:2px solid #DDD0C0;
  background:#FAF6F0;
}
.step.done .step-dot { background:#EAFAF1; border-color:#27AE60; }
.step.active .step-dot { background:#7B1B42; border-color:#7B1B42; color:#fff; }
.step-content { flex:1; padding-top:4px; }
.step-label { font-size:14px; font-weight:600; }
.step-date { font-size:12px; color:#6B4C3B; margin-top:2px; }

.items-section { margin-top:20px; }
.items-title { font-size:14px; font-weight:700; margin-bottom:12px; color:#7B1B42; }
.item-row {
  display:flex; align-items:center; gap:12px;
  padding:10px 0; border-bottom:1px solid #F3EDE4;
}
.item-row:last-child { border-bottom:none; }
.item-icon { font-size:28px; }
.item-info { flex:1; }
.item-name { font-size:14px; font-weight:600; }
.item-meta { font-size:12px; color:#6B4C3B; margin-top:2px; }
.item-price { font-weight:700; color:#7B1B42; font-size:14px; }

.measurements-box {
  background:#FEF9E7; border-radius:10px; padding:14px;
  margin-top:16px; border:1px solid #F0C040;
}
.measurements-title { font-size:13px; font-weight:700; color:#E67E22; margin-bottom:8px; }
.m-row { display:flex; justify-content:space-between; font-size:13px; padding:4px 0; }

.not-found {
  text-align:center; padding:48px 24px;
}
.not-found .icon { font-size:56px; margin-bottom:16px; }
.not-found h3 { font-size:18px; font-weight:700; margin-bottom:8px; color:#7B1B42; }
.not-found p { font-size:13px; color:#6B4C3B; }

.loading { text-align:center; padding:40px; color:#6B4C3B; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">BY LUBNA</div>
  <div class="header-sub">✦ تتبع طلبك ✦</div>
</div>

<div class="container">
  <div class="search-box">
    <h2>🔍 تتبع حالة طلبك</h2>
    <div class="search-row">
      <input type="text" class="search-input" id="billInput"
        placeholder="STO-123456 أو BL-2026-001"
        value="">
      <button class="search-btn" onclick="searchOrder()">بحث</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDBo7Y74T5ELQ1UCSNm9TyE7PajuwtJTpA",
  authDomain: "bylubna-f31a4.firebaseapp.com",
  databaseURL: "https://bylubna-f31a4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bylubna-f31a4",
  storageBucket: "bylubna-f31a4.firebasestorage.app",
  messagingSenderId: "331210998611",
  appId: "1:331210998611:web:e1c639a66036242fa917a6"
};

let fbDB;
try {
  const app = initializeApp(FIREBASE_CONFIG, 'bylubna-track');
  fbDB = getDatabase(app);
} catch(e) {
  const app = initializeApp(FIREBASE_CONFIG);
  fbDB = getDatabase(app);
}

window.searchOrder = async function() {
  const bill = document.getElementById('billInput').value.trim().toUpperCase();
  if (!bill) return;
  const resultEl = document.getElementById('result');
  resultEl.innerHTML = '<div class="loading">⏳ جاري البحث...</div>';

  try {
    const snap = await get(ref(fbDB, 'bylubna/orders'));
    if (!snap.exists()) { showNotFound(bill); return; }

    const raw = snap.val();
    const orders = Array.isArray(raw) ? raw.filter(Boolean) : Object.values(raw).filter(Boolean);
    const order = orders.find(o => o && (o.bill||'').toUpperCase() === bill);

    if (!order) { showNotFound(bill); return; }
    showOrder(order);
  } catch(e) {
    resultEl.innerHTML = '<div class="not-found"><div class="icon">⚠️</div><h3>حدث خطأ</h3><p>حاول مرة أخرى</p></div>';
  }
};

function showNotFound(bill) {
  document.getElementById('result').innerHTML = `
    <div class="result-card not-found">
      <div class="icon">📭</div>
      <h3>لم يُعثَر على الطلب</h3>
      <p>لا يوجد طلب برقم <strong>${bill}</strong></p>
      <p style="margin-top:8px">يرجى مراجعة الرابط أو التواصل مع By Lubna</p>
    </div>`;
}

function showOrder(o) {
  const statusMap = {
    'جديد': { label:'جديد', cls:'s-new', icon:'🆕' },
    'قيد التفصيل': { label:'قيد التفصيل', cls:'s-tailor', icon:'✂️' },
    'جاهز للتسليم': { label:'جاهز للتسليم', cls:'s-ready', icon:'✅' },
    'تم التسليم': { label:'تم التسليم', cls:'s-done', icon:'📦' },
    'ملغي': { label:'ملغي', cls:'s-cancel', icon:'❌' },
  };
  const s = statusMap[o.status] || statusMap['جديد'];

  const steps = [
    { label:'استلام الطلب', icon:'📋', done: true, date: o.orderDate||'' },
    { label:'قيد التفصيل / التجهيز', icon:'✂️',
      done: ['قيد التفصيل','جاهز للتسليم','تم التسليم'].includes(o.status),
      active: o.status === 'قيد التفصيل' },
    { label:'جاهز للتسليم', icon:'🎁',
      done: ['جاهز للتسليم','تم التسليم'].includes(o.status),
      active: o.status === 'جاهز للتسليم' },
    { label:'تم التسليم', icon:'✅',
      done: o.status === 'تم التسليم',
      active: false,
      date: o.deliverDate||'' },
  ];

  const items = o.items || [{ type: o.type||'عباية', color: o.color||'', qty: o.qty||1, price: o.amount||0 }];

  const measureHtml = o.measurements ? `
    <div class="measurements-box">
      <div class="measurements-title">✂️ مقاسات التفصيل</div>
      <div class="m-row"><span>الطول الكلي</span><strong>${o.measurements.height||'-'}</strong></div>
      <div class="m-row"><span>العرض (الكتفين)</span><strong>${o.measurements.width||'-'}</strong></div>
      <div class="m-row"><span>طول الكم من نصف الرقبة</span><strong>${o.measurements.sleeve||'-'}</strong></div>
    </div>` : '';

  document.getElementById('result').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="bill-no">📋 ${o.bill}</div>
        <span class="status-badge ${s.cls}">${s.icon} ${s.label}</span>
      </div>

      <div class="info-row">
        <span class="info-label">الاسم</span>
        <span class="info-value">${o.name||'-'}</span>
      </div>
      <div class="info-row">
        <span class="info-label">تاريخ الطلب</span>
        <span class="info-value">${o.orderDate||'-'}</span>
      </div>
      ${o.deliverDate ? `<div class="info-row">
        <span class="info-label">تاريخ التسليم</span>
        <span class="info-value">${o.deliverDate}</span>
      </div>` : ''}
      <div class="info-row">
        <span class="info-label">الإجمالي</span>
        <span class="info-value" style="color:#7B1B42">${((o.amount||0)*(o.qty||1)).toFixed(3)} ر.ع</span>
      </div>
      ${o.remaining > 0 ? `<div class="info-row">
        <span class="info-label">المتبقي</span>
        <span class="info-value" style="color:#E67E22">${(o.remaining||0).toFixed(3)} ر.ع</span>
      </div>` : ''}

      <div class="items-section">
        <div class="items-title">🧕 العبايات</div>
        ${items.map(item => `
          <div class="item-row">
            <div class="item-icon">🧕</div>
            <div class="item-info">
              <div class="item-name">${item.type||'عباية'}</div>
              <div class="item-meta">${[item.color, item.size, item.qty>1?'الكمية: '+item.qty:''].filter(Boolean).join(' • ')}</div>
            </div>
            <div class="item-price">${((item.price||0)*(item.qty||1)).toFixed(3)} ر.ع</div>
          </div>`).join('')}
      </div>

      ${measureHtml}

      <div class="timeline">
        <div class="timeline-title">📍 مراحل الطلب</div>
        ${steps.map(step => `
          <div class="step ${step.done?'done':''} ${step.active?'active':''}">
            <div class="step-dot">${step.done && !step.active ? '✓' : step.icon}</div>
            <div class="step-content">
              <div class="step-label">${step.label}</div>
              ${step.date ? `<div class="step-date">${step.date}</div>` : ''}
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}

// Auto-search from URL
const urlBill = new URLSearchParams(window.location.search).get('id');
if (urlBill) {
  document.getElementById('billInput').value = urlBill;
  searchOrder();
}
</script>
</body>
</html>
